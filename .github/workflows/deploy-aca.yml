name: Build and deploy on Azure container apps

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    # paths:
    # - 'webui/**' 
  pull_request_target:
    branches: 
      [ main ]
  # Allow mannually trigger 
  workflow_dispatch:   


permissions:
  id-token: write #This is required for requesting the OIDC JWT Token
  contents: read #Required when GH token is used to authenticate with private repo

concurrency:
  group: deploy-aca
  cancel-in-progress: false

   

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.PLATTENTESTS_REGISTRY_USERNAME }}
          password: ${{ secrets.PLATTENTESTS_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jetzlstorfer/plattentests-web:${{ github.sha }}
          file: ./webui/Dockerfile
          build-args: GIT_SHA=${{ github.sha }}
          context: .


  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    env:
      PLATTENTESTS_AAD_CLIENT_ID: ${{ secrets.PLATTENTESTS_AAD_CLIENT_ID }}
      PLATTENTESTS_AAD_CLIENT_SECRET: ${{ secrets.PLATTENTESTS_AAD_CLIENT_SECRET }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.PLATTENTESTS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLATTENTESTS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATTENTESTS_AZURE_SUBSCRIPTION_ID }}


      - name: Deploy to containerapp
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp registry set -n plattentests -g aca-plattentests --server docker.io --username  ${{ secrets.PLATTENTESTS_REGISTRY_USERNAME }} --password ${{ secrets.PLATTENTESTS_REGISTRY_PASSWORD }}
            az containerapp update -n plattentests -g aca-plattentests --image jetzlstorfer/plattentests-web:${{ github.sha }}

      # Configure Easy Auth (Azure AD) on the Container App.
      # This step is skipped when the required secrets are not present (e.g. on forks or first-time
      # setup). See docs/easy-auth-setup.md for how to create the App Registration and store the
      # secrets PLATTENTESTS_AAD_CLIENT_ID and PLATTENTESTS_AAD_CLIENT_SECRET in GitHub.
      - name: Configure Easy Auth on containerapp
        if: env.PLATTENTESTS_AAD_CLIENT_ID != '' && env.PLATTENTESTS_AAD_CLIENT_SECRET != ''
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            # Enable authentication and allow unauthenticated traffic so the public "/" route
            # remains accessible while "/createPlaylist" is gated by the application itself.
            az containerapp auth update \
              --name plattentests \
              --resource-group aca-plattentests \
              --enabled true \
              --unauthenticated-client-action AllowAnonymous \
              --yes
            # Configure Azure AD (Microsoft) as identity provider.
            az containerapp auth microsoft update \
              --name plattentests \
              --resource-group aca-plattentests \
              --client-id "$PLATTENTESTS_AAD_CLIENT_ID" \
              --client-secret "$PLATTENTESTS_AAD_CLIENT_SECRET" \
              --tenant-id ${{ secrets.PLATTENTESTS_AZURE_TENANT_ID }} \
              --yes

      - name: Show Easy Auth configuration
        if: env.PLATTENTESTS_AAD_CLIENT_ID != '' && env.PLATTENTESTS_AAD_CLIENT_SECRET != ''
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp auth show \
              --name plattentests \
              --resource-group aca-plattentests \
              --query "{platformEnabled:platform.enabled, unauthenticatedAction:globalValidation.unauthenticatedClientAction}"
            az containerapp auth microsoft show \
              --name plattentests \
              --resource-group aca-plattentests \
              --query "{enabled:enabled, clientId:registration.clientId, openIdIssuer:registration.openIdIssuer}"
